name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    name: Smart contract — test & build wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests
        run: cargo test -p smart-wallet
      - name: Build wasm (release)
        run: cargo build -p smart-wallet --release --target wasm32v1-none
      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-wallet-wasm
          path: target/wasm32v1-none/release/smart_wallet.wasm

  frontend:
    name: Console — typecheck, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
